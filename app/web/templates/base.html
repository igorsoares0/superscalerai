<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SuperScaler{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.11/dist/index.global.js"
          integrity="sha384-XXN6/S6yXj8EpXnBTw3JGR9ZM+hixGxFCLYn0FHtg9cWh0ziKmAgTPEhecbCDOmj"
          crossorigin="anonymous"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-ink:    #0a0a0c;
      --color-panel:  #131316;
      --color-raise:  #1a1a20;
      --color-line:   rgba(255,255,255,0.07);
      --color-body:   #f0f0f3;
      --color-mute:   #8d8d97;
      --color-accent: #4b72ff;
      --color-ok:     #3dd68c;
      --color-err:    #ff6161;
      --font-display: "Space Grotesk", sans-serif;
      --font-sans:    "Inter", system-ui, sans-serif;
      --font-mono:    "JetBrains Mono", ui-monospace, monospace;
    }
    ::selection { background: #4b72ff55; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body class="h-full bg-ink text-body font-sans antialiased">
  <div class="flex h-full">

    <!-- sidebar -->
    <aside class="flex w-16 shrink-0 flex-col items-center gap-2 border-r border-line py-4">
      <a href="/" title="SuperScaler" class="mb-4 flex h-10 w-10 items-center justify-center rounded-xl bg-accent/15 font-display text-lg font-bold text-accent">S</a>

      <a href="/" title="Upscale" class="flex h-10 w-10 items-center justify-center rounded-xl transition-colors {{ 'bg-raise text-body' if page == 'workspace' else 'text-mute hover:text-body' }}">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </a>

      <a href="/library" title="Library" class="flex h-10 w-10 items-center justify-center rounded-xl transition-colors {{ 'bg-raise text-body' if page == 'library' else 'text-mute hover:text-body' }}">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </a>

      <div class="mt-auto"></div>

      <button id="logout-btn" title="Sign out" class="flex h-10 w-10 items-center justify-center rounded-xl text-mute transition-colors hover:text-err">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </aside>

    <!-- main column -->
    <div class="flex min-w-0 flex-1 flex-col">
      <header class="flex h-16 shrink-0 items-center justify-between border-b border-line px-6">
        <div>
          <span class="font-display text-lg font-bold tracking-tight">SuperScaler</span>
          <span class="ml-3 hidden text-sm text-mute sm:inline" id="topbar-email"></span>
        </div>
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-2 rounded-full border border-line bg-panel px-4 py-1.5">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-accent"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
            <span class="font-mono text-sm" id="credits-badge">—</span>
            <span class="text-xs text-mute">credits</span>
          </div>
          <button id="buy-credits-btn"
                  class="rounded-full bg-accent px-4 py-1.5 text-sm font-medium text-white transition-colors hover:bg-accent/85">
            Upgrade
          </button>
        </div>
      </header>

      <main class="min-h-0 flex-1 overflow-y-auto">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <!-- buy credits modal -->
  <div id="billing-modal" role="dialog" aria-modal="true" aria-labelledby="billing-title"
       class="fixed inset-0 z-40 hidden items-center justify-center bg-black/70 p-6 backdrop-blur-sm">
    <div class="w-full max-w-md rounded-2xl border border-line bg-panel p-6">
      <div class="mb-1 flex items-center justify-between">
        <h2 id="billing-title" class="font-display text-lg font-bold">Choose your plan</h2>
        <button id="billing-close" class="rounded-lg p-1 text-mute transition-colors hover:text-body" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <p class="mb-5 text-sm text-mute">Your credits reset to the plan's allowance every month. 1 credit ≈ one small upscale.</p>
      <div id="billing-packs" class="flex flex-col gap-3"></div>
      <p id="billing-status" class="mt-4 hidden text-sm"></p>
    </div>
  </div>

  <!-- Paddle.js must load from Paddle's CDN and is updated by them, so it can't be SRI-pinned -->
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js" defer></script>
  <script src="/static/app.js"></script>
  <script src="/static/billing.js" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
